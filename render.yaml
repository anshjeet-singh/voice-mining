# Render Blueprint — deploys the app as a single web service (free plan).
# The database lives on TiDB Cloud Serverless (free, MySQL-compatible);
# set DATABASE_URL and the other secrets in the Render dashboard.
services:
  - type: web
    name: voice-mining
    runtime: node
    plan: free
    # DB schema is applied out-of-band (pnpm db:push); the build just installs + builds.
    # `corepack pnpm` runs pnpm via the corepack shim without `corepack enable`,
    # which fails on Render's read-only /usr/bin.
    buildCommand: corepack pnpm@10.4.1 install && corepack pnpm@10.4.1 build
    startCommand: node dist/index.js
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-opus-4-8
      - key: SERP_API_KEY
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: TWITTER_BEARER_TOKEN
        sync: false
      - key: CRON_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
